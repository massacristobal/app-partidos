<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ APP Partidos</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <!-- Pantalla de login/registro -->
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-card">
      <h1>⚽ APP Partidos</h1>
      <p class="subtitle">Arma equipos parejos con tus amigos</p>
      <div class="tabs">
        <button class="tab active" data-authtab="login">Entrar</button>
        <button class="tab" data-authtab="register">Crear cuenta</button>
      </div>
      <form id="loginForm">
        <input id="loginUser" placeholder="Usuario" autocomplete="username" required>
        <input id="loginPass" type="password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn primary">Entrar</button>
      </form>
      <form id="registerForm" class="hidden">
        <input id="regUser" placeholder="Usuario (ej: cristobal)" required>
        <input id="regName" placeholder="Nombre para mostrar" required>
        <input id="regPass" type="password" placeholder="Contraseña" required>
        <label>Posición</label>
        <select id="regPosition">
          <option value="arquero">🧤 Arquero</option>
          <option value="defensa">🛡️ Defensa</option>
          <option value="medio" selected>⚙️ Mediocampista</option>
          <option value="delantero">🎯 Delantero</option>
        </select>
        <button type="submit" class="btn primary">Crear cuenta</button>
      </form>
      <p id="authError" class="error"></p>
    </div>
  </div>

  <!-- App principal -->
  <div id="mainScreen" class="hidden">
    <header>
      <span class="logo">⚽ APP Partidos</span>
      <span id="userBadge"></span>
      <button id="logoutBtn" class="btn small">Salir</button>
    </header>
    <nav>
      <button class="navbtn active" data-view="matches">Partidos</button>
      <button class="navbtn" data-view="groups">Grupos</button>
      <button class="navbtn" data-view="friends">Amigos</button>
      <button class="navbtn" data-view="ranking">Ranking</button>
      <button class="navbtn" data-view="profile">Mi perfil</button>
    </nav>
    <main>
      <section id="view-matches" class="view"></section>
      <section id="view-groups" class="view hidden"></section>
      <section id="view-friends" class="view hidden"></section>
      <section id="view-ranking" class="view hidden"></section>
      <section id="view-profile" class="view hidden"></section>
    </main>
  </div>
  <div id="toast" class="toast hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
